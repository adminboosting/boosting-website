# Supabase project config. Minimal and widely compatible; `supabase init` can
# regenerate a fuller version. Migrations live in supabase/migrations/*.sql and
# seed data in supabase/seed.sql. See RUNBOOK.md for how to apply them to the
# free hosted project (no local Docker required).
project_id = "rankedfrogs"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[storage]
enabled = true
file_size_limit = "5MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false
